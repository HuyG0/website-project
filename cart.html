<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Giỏ hàng</title>
</head>

<body>

<h2>Giỏ hàng</h2>

<div id="cart"></div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

let cartDiv = document.getElementById("cart");

if(cart.length === 0){
    cartDiv.innerHTML = "<p>Giỏ hàng trống</p>";
}else{

cart.forEach((p,i)=>{

cartDiv.innerHTML += `
<p>
${p.name} - ${p.price}đ 
<button onclick="removeItem(${i})">Xóa</button>
</p>
`;

total += p.price;

});

cartDiv.innerHTML += `<h3>Tổng tiền: ${total}đ</h3>`;
cartDiv.innerHTML += `<button onclick="checkout()">Thanh toán</button>`;

}

function removeItem(i){

cart.splice(i,1);

localStorage.setItem("cart",JSON.stringify(cart));

location.reload();

}

function checkout(){

let user = localStorage.getItem("user");

if(!user){

alert("Bạn cần đăng nhập trước khi thanh toán");
window.location.href="login.html";
return;

}

alert("Thanh toán thành công!");

localStorage.removeItem("cart");

location.reload();

}

</script>

</body>
</html>
